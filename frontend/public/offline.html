<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Rentalink Offline</title>

    <meta
      name="theme-color"
      content="#020617"
    />

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: white;
        font-family: Inter, Arial, sans-serif;
        padding: 24px;
      }

      .offline-card {
        width: min(480px, 100%);
        padding: 36px;
        border-radius: 24px;
        background: #111827;
        border: 1px solid #1e293b;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
      }

      .eyebrow {
        color: #22d3ee;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-weight: 700;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 34px;
      }

      p {
        color: #cbd5e1;
        line-height: 1.7;
      }

      button {
        margin-top: 24px;
        width: 100%;
        border: 1px solid #0891b2;
        background: #06b6d4;
        color: #020617;
        padding: 14px 18px;
        border-radius: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s ease;
      }

      button:hover {
        opacity: 0.92;
      }
    </style>
  </head>

  <body>
    <section class="offline-card">
      <p class="eyebrow">
        Rentalink Offline
      </p>

      <h1>You are currently offline</h1>

      <p>
        Rentalink cannot reach the network right now.
        Live operational intelligence, dashboards,
        payments and real-time monitoring require
        an internet connection.
      </p>

      <p>
        Reconnect to continue using AI-enhanced
        rental governance and operational intelligence.
      </p>

      <button onclick="window.location.reload()">
        Try Again
      </button>
    </section>
  </body>
</html>
